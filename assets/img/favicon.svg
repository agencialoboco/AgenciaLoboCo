<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Agência Lobo & Co">
  <!-- Emblema recriado a partir do agencia.md: lobo tribal (positiva/branca) em moldura sobre fundo grafite -->
  <rect width="512" height="512" rx="96" fill="#0E1217"/>
  <rect x="20" y="20" width="472" height="472" rx="80" fill="none" stroke="#FFFFFF" stroke-width="10" opacity="0.9"/>

  <!-- AGÊNCIA -->
  <text x="256" y="104" text-anchor="middle" fill="#FFFFFF"
        font-family="Poppins, Arial, sans-serif" font-weight="800" font-size="42" letter-spacing="6">AGÊNCIA</text>

  <!-- Lobo estilizado (angular / tribal), branco -->
  <g fill="#FFFFFF">
    <path d="M150 150
             L210 208
             L256 176
             L302 208
             L362 150
             L348 268
             L396 306
             L330 326
             L300 366
             L256 404
             L212 366
             L182 326
             L116 306
             L164 268
             Z"/>
  </g>
  <!-- Olhos e focinho recortados na cor do fundo (expressão agressiva) -->
  <g fill="#0E1217">
    <path d="M196 250 L244 264 L200 278 Z"/>
    <path d="M316 250 L268 264 L312 278 Z"/>
    <path d="M256 300 L238 344 L256 360 L274 344 Z"/>
  </g>

  <!-- LOBO & CO -->
  <text x="256" y="452" text-anchor="middle" fill="#FFFFFF"
        font-family="Poppins, Arial, sans-serif" font-weight="800" font-size="40" letter-spacing="4">LOBO &amp; CO</text>
</svg>
