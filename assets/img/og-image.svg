        <path d="M316 250 L268 264 L312 278 Z"/>
        <path d="M256 300 L238 344 L256 360 L274 344 Z"/>
      </g>
    </g>
    <text x="140" y="34" text-anchor="middle" fill="#FFFFFF" font-family="Poppins, Arial, sans-serif" font-weight="700" font-size="22" letter-spacing="6">AGÊNCIA</text>
