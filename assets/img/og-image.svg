      <stop offset="0%" stop-color="#F2A007" stop-opacity="0.28"/>
      <stop offset="70%" stop-color="#F2A007" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#0E1217"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Emblema (lobo tribal, positiva/branca) -->
  <g transform="translate(120,175)">
    <rect x="0" y="0" width="280" height="280" rx="54" fill="none" stroke="#FFFFFF" stroke-width="6" opacity="0.9"/>
    <g transform="translate(140,140) scale(0.42) translate(-256,-256)">
