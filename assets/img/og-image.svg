    <text x="-4" y="340" fill="#FFFFFF" font-family="Poppins, Arial, sans-serif" font-weight="900" font-size="96" letter-spacing="-2">LOBO &amp; CO</text>
    <rect x="0" y="372" width="96" height="6" rx="3" fill="#F2A007"/>
    <text x="0" y="428" fill="#A9B6C2" font-family="Poppins, Arial, sans-serif" font-weight="500" font-size="30">Transformamos ideias em</text>
    <text x="0" y="470" fill="#A9B6C2" font-family="Poppins, Arial, sans-serif" font-weight="500" font-size="30">resultados palpáveis.</text>
